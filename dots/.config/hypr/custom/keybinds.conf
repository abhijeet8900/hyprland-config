# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

# =========================
# USER CUSTOM KEYBINDS
# =========================

#! Shell / Launcher
bindd = Super, code:65, Toggle search, global, quickshell:searchToggleRelease # Super+Space search

#! Sidebar / UI
bind = Super, A, global, quickshell:sidebarLeftToggle
bindd = Super, N, Toggle right sidebar, global, quickshell:sidebarRightToggle
bindd = Super, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle
bindd = Super, K, Toggle on-screen keyboard, global, quickshell:oskToggle
bindd = Super, M, Toggle media controls, global, quickshell:mediaControlsToggle
bind = Super, G, global, quickshell:overlayToggle
bindd = Super, J, Toggle bar, global, quickshell:barToggle

#! Clipboard / Emoji
bindd = Super, V, Clipboard history >> clipboard, global, quickshell:overviewClipboardToggle
bindd = Super, Period, Emoji >> clipboard, global, quickshell:overviewEmojiToggle

#! Screenshot / Recording
bind = Super+Shift, S, global, quickshell:regionScreenshot
bind = Super+Shift, S, exec, qs -c $qsConfig ipc call TEST_ALIVE || hyprshot --freeze --clipboard-only --mode region --silent

bind = Super+Shift, A, global, quickshell:regionSearch
bind = Super+Shift, A, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/hypr/hyprland/scripts/snip_to_search.sh

bindl = Super+Shift, R, global, quickshell:regionRecord
bindl = Super+Shift, R, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/videos/record.sh

#! Window Management
bind = Super, Q, killactive
bind = Super+Shift+Alt, Q, exec, hyprctl kill

bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

bind = Super+Alt, Space, togglefloating
bind = Super, F, fullscreen, 0
bind = Super, D, fullscreen, 1
bind = Super, P, pin

#! Workspace switching
bind = Super, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1
bind = Super, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2
bind = Super, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3
bind = Super, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4
bind = Super, code:67, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5
bind = Super, code:68, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6
bind = Super, code:69, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7
bind = Super, code:70, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8
bind = Super, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9
bind = Super, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10

#! Move window to workspace
bind = Super+Shift, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 1
bind = Super+Shift, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 2
bind = Super+Shift, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 3
bind = Super+Shift, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 4

#! Scratchpad
bind = Super, S, togglespecialworkspace
bind = Super+Alt, S, movetoworkspacesilent, special

#! Apps
bind = Super, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "${TERMINAL}" "kitty -1" "foot" "alacritty"
bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar"
bind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "firefox" "brave" "chromium"
bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "cursor" "zed"

#! Session
bindd = Super, L, Lock, exec, loginctl lock-session
bindld = Super+Shift, L, Suspend system, exec, systemctl suspend || loginctl suspend